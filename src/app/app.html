<div class="mt-20 flex items-center justify-center">
  <div class="bg-gray-100 shadow-2xl rounded-xl p-6 w-full max-w-xl">
    <h2 class="text-2xl font-bold text-center mb-4">Todo List</h2>

    <div class="flex gap-2 mb-4">
      <input
        type="text"
        [(ngModel)]="task"
        placeholder="Enter task"
        (keyup.enter)="addTask()"
        class="flex-1 border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
      />

      <button
        (click)="addTask()"
        class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 cursor-pointer"
      >
        Add
      </button>
    </div>

    @for (task of taskList; track task.id) {
      <ul class="flex justify-between items-center bg-gray-50 p-3 rounded-lg mb-2 shadow-sm">
        <li class="text-sm text-gray-500">{{ task.id }}</li>
        <li class="font-medium">{{ task.name }}</li>
        <li>
          <button
            (click)="deleteTask(task.id)"
            class="bg-red-500 text-white px-3 py-1 rounded-lg hover:bg-red-600 cursor-pointer"
          >
            Delete
          </button>
        </li>
      </ul>
    }
  </div>
</div>
